name: Build Android Engine and Official SaveEditor Mod

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    # 1. Setup Java environment required by Android SDK / Gradle
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 2. Setup the Android NDK
    - name: Setup Android NDK
      uses: nandroid/setup-ndk@v3
      with:
        ndk-version: r25c

    # 3. Checkout the RSDKModding Base Engine
    - name: Checkout RSDKModding Engine
      uses: actions/checkout@v4
      with:
        repository: 'RSDKModding/RSDKv5-Decompilation'
        path: 'engine'
        submodules: recursive

    # 4. Checkout the RSDKModding Sonic Mania Game Logic
    - name: Checkout RSDKModding Sonic Mania Logic
      uses: actions/checkout@v4
      with:
        repository: 'RSDKModding/Sonic-Mania-Decompilation'
        path: 'game'
        submodules: recursive

    # 5. Checkout the OFFICIAL MegAmi24 Mod Repository instead of yours
    - name: Checkout Official MegAmi24 Mod Repository
      uses: actions/checkout@v4
      with:
        repository: 'MegAmi24/Mania-Decomp-Mods'
        path: 'mods'
        submodules: recursive

    # 6. Inject Game and SaveEditor into the Android NDK build tree via symlinks
    - name: Create Native Symlinks
      run: |
        cd engine/android/app/jni
        ln -s ../../../../game Game
        ln -s ../../../../mods/SaveEditor SaveEditor

    # 7. Grant permissions and execute Gradle to build the debug APK
    - name: Build Android APK
      run: |
        cd engine/android
        chmod +x gradlew
        ./gradlew assembleDebug

    # 8. Upload the completed APK file as an artifact
    - name: Upload Android APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Sonic-Mania-Official-SaveEditor-APK
        path: engine/android/app/build/outputs/apk/debug/*.apk
        if-no-files-found: error
